<html lang="en">

</head>
<body>
    <button class ="button" onclick="cartitems++; document.querySelector('#cart-summary').innerText=`Your bag has ${cartitems} items`;" > Add to Bag </button>
<button class ="wish" onclick="cartitems--; document.querySelector('#cart-summary').innerText=`Your bag has ${cartitems} items`;">Move to Wishlist</button>
<button class ="button" onclick="cartitems+=2; document.querySelector('#cart-summary').innerText=`Your bag has ${cartitems} items`;" >Add 1+1 Sale Item</button>
<h1 id="cart-summary"></h1>
<script>
    let cartitems = 0;
    document.querySelector('#cart-summary').innerText=`Your bag has ${cartitems} items`;

</script>
</body>
